name: Build Samsung Kernel (Google Drive Fetch + AOSP Toolchain + KSU)

on:
  workflow_dispatch: 

jobs:
  build:
    name: Purge, Fetch from Drive, Sync, Patch, and Build
    runs-on: ubuntu-22.04

    steps:
      # 1. Clean up the runner to maximize free space quietly (~35GB+ reclaimed)
      - name: Free Disk Space Manually
        run: |
          echo "=== Disk Space BEFORE Cleanup ==="
          df -h
          
          echo "Purging core heavy package engines quietly..."
          # Removed wildcards to prevent log spamming, added -qq for quiet mode
          sudo apt-get purge -y -qq azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql mysql-server
          sudo apt-get autoremove -y -qq
          sudo apt-get clean -qq
          
          echo "Deleting massive pre-installed software directories (Silent & Fast)..."
          # rm -rf is completely silent and ignores files/folders that don't exist
          sudo rm -rf /usr/local/lib/android     # Android SDK (~12GB)
          sudo rm -rf /usr/share/dotnet          # .NET Core SDK (~4-5GB)
          sudo rm -rf /opt/ghc                   # Haskell compiler (~2GB)
          sudo rm -rf /usr/share/swift           # Swift runtime (~1GB)
          sudo rm -rf /usr/local/share/boost     # Boost C++ Libraries (~4GB)
          sudo rm -rf /opt/hostedtoolcache/CodeQL # CodeQL analysis tools (~5GB)
          sudo rm -rf /opt/hostedtoolcache/Java   # Extraneous Java versions
          sudo rm -rf /usr/local/share/powershell # PowerShell modules
          
          echo "Cleaning up residual configuration directories..."
          sudo rm -rf /etc/mysql /opt/az /etc/apt/sources.list.d/*
          
          echo "Purging background docker cache layers..."
          docker image prune --all --force > /dev/null
          
          echo "=== Disk Space AFTER Cleanup ==="
          df -h

      # 2. Install Build Dependencies, Python PIP, and Google Repo tool
      - name: Install Build Dependencies & Repo Tool
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libc6-dev-i386 libncurses5 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 python3-pip python-is-python3
          
          # Install gdown to pull files securely from Google Drive
          pip3 install gdown
        
      # 3. Securely pull Kernel.tar.gz from Google Drive
      - name: Fetch Kernel from Google Drive
        run: |
          echo "Downloading Kernel.tar.gz from Google Drive..."
          # REPLACE the URL below with your actual Google Drive Share Link or File ID
          gdown "https://drive.google.com/file/d/1mYxE44LH-xz8fg0GuEYxcJ-f7OS6mGke/view?usp=sharing" -O Kernel.tar.gz

          echo "Downloading Toolchain.tar.gz from Google Drive..."
          gdown "https://drive.google.com/file/d/1OxwZZNzDaY-VoSqJSFjPuKfKKQuzNcUP/view?usp=sharing" -O Toolchain.tar.gz

      # 4. Handle double extraction & drop intermediate archives instantly
      - name: Extract Samsung Kernel Archive
        run: |
          echo "Extracting Kernel.tar.gz directly to working directories..."
          tar -xzvf Kernel.tar.gz
          rm Kernel.tar.gz 

          echo "Extracting Toolchain.tar.gz..."
          mkdir temp_toolchain
          tar -xzvf Toolchain.tar.gz -C temp_toolchain
          
          echo "Handling nested toolchain.tar..."
          cd temp_toolchain
          if [ -f toolchain.tar ]; then
            tar -xvf toolchain.tar
            rm toolchain.tar
          fi
          cd ..
          
          echo "Verifying local directory structure:"
          ls -la

      # 5. Configure JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 6. Merge Samsung Toolchain seamlessly into Workspace
      - name: Merge Samsung Toolchain
        run: |
          echo "Unlocking write permissions on existing kernel directories..."
          chmod -R +w kernel/ kernel-6.6/ vendor/ || true
          
          echo "Merging toolchain components into the kernel tree..."
          mkdir -p kernel/build kernel/external kernel/prebuilts
          
          # Safely merge the extracted toolchain components
          rsync -a temp_toolchain/build/ kernel/build/ 2>/dev/null || true
          rsync -a temp_toolchain/external/ kernel/external/ 2>/dev/null || true
          rsync -a temp_toolchain/prebuilts/ kernel/prebuilts/ 2>/dev/null || true
          
          if [ -d "temp_toolchain/kernel" ]; then
            rsync -a temp_toolchain/kernel/ kernel/ 2>/dev/null || true
          fi
          
          # Clean up the temporary toolchain folder to save disk space
          rm -rf temp_toolchain Toolchain.tar.gz
          
      # 7. Automatically patch the kernel tree for KernelSU
      - name: Inject KernelSU
        run: |
          cd kernel-6.6
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

      # 8. Fire off the original wrapper script provided by Samsung
      - name: Execute Samsung Kernel Build
        run: |
          chmod +x build_kernel.sh
          ./build_kernel.sh

      # 9. Target and compress the specific output binaries and modules (.ko)
      - name: Upload Rooted Kernel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rooted-samsung-kernel-output
          path: |
            out/target/product/a06/obj/KLEAF_OBJ/dist/kernel_device_modules-6.6/mgk_64_k66_kernel_aarch64.user/Image.gz
            out/target/product/a06/obj/KLEAF_OBJ/dist/*/*.ko
          if-no-files-found: error
