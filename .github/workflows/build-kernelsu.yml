name: Build Samsung A06 (SM-A065F) Kernel with Kernel SU (Google Drive Fetch + Samsung Open Source Toolchain)

on:
  workflow_dispatch: 

jobs:
  build:
    name: Purge, Fetch from Drive, Patch, and Build
    runs-on: ubuntu-22.04
    permissions: 
      contents: write

    steps:
      # 1. Clean up the runner to maximize free space quietly (~35GB+ reclaimed)
      - name: Free Disk Space Manually
        run: |
          echo "=== Disk Space BEFORE Cleanup ==="
          df -h
          
          echo "Purging core heavy package engines quietly (Silencing all warnings)..."
          sudo DEBIAN_FRONTEND=noninteractive apt-get purge -y -qq azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql mysql-server > /dev/null 2>&1
          sudo DEBIAN_FRONTEND=noninteractive apt-get autoremove -y -qq > /dev/null 2>&1
          sudo apt-get clean -qq > /dev/null 2>&1
          
          echo "Deleting massive pre-installed software directories (Silent & Fast)..."
          sudo rm -rf /usr/local/lib/android     # Android SDK (~12GB)
          sudo rm -rf /usr/share/dotnet          # .NET Core SDK (~4-5GB)
          sudo rm -rf /opt/ghc                   # Haskell compiler (~2GB)
          sudo rm -rf /usr/share/swift           # Swift runtime (~1GB)
          sudo rm -rf /usr/local/share/boost     # Boost C++ Libraries (~4GB)
          sudo rm -rf /opt/hostedtoolcache/CodeQL # CodeQL analysis tools (~5GB)
          sudo rm -rf /opt/hostedtoolcache/Java   # Extraneous Java versions
          sudo rm -rf /usr/local/share/powershell # PowerShell modules
          
          echo "Cleaning up residual configuration directories..."
          sudo rm -rf /etc/mysql /opt/az /etc/apt/sources.list.d/* > /dev/null 2>&1
          
          echo "Purging background docker cache layers..."
          docker image prune --all --force > /dev/null 2>&1
          
          echo "=== Disk Space AFTER Cleanup ==="
          df -h

      # 2. Install Build Dependencies and Python PIP fo Gdown
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential binutils-aarch64-linux-gnu zip curl zlib1g-dev libc6-dev-i386 libncurses5 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 python3-pip python-is-python3
          
          # Install gdown to pull files securely from Google Drive
          pip3 install gdown
        
      # 3. Securely pull Kernel.tar.gz and Toolchain.tar.gz from Google Drive
      - name: Fetch Kernel and toolchain from Google Drive
        run: |
          echo "Downloading Kernel.tar.gz from Google Drive..."
          gdown "https://drive.google.com/file/d/1mYxE44LH-xz8fg0GuEYxcJ-f7OS6mGke/view?usp=sharing"

          echo "Downloading toolchain.tar.gz from Google Drive..."
          gdown "https://drive.google.com/file/d/1OxwZZNzDaY-VoSqJSFjPuKfKKQuzNcUP/view?usp=sharing"

      # 4. Handle double extraction & drop intermediate archives instantly
      - name: Extract Samsung Kernel and toolchain archives
        run: |
          echo "Extracting Kernel.tar.gz directly to working directories..."
          tar -xzvf Kernel.tar.gz
          rm -f Kernel.tar.gz
          
          # Safety net for nested Kernel.tar
          if [ -f Kernel.tar ]; then
            echo "Unpacking nested Kernel.tar..."
            tar -xvf Kernel.tar
            rm -f Kernel.tar
          fi

          echo "Extracting toolchain.tar.gz..."
          mkdir temp_toolchain
          tar -xzvf toolchain.tar.gz -C temp_toolchain
          rm -f toolchain.tar.gz
          
          echo "Handling nested toolchain.tar..."
          cd temp_toolchain
          # Safety for nested toolchain.tar 
          if [ -f toolchain.tar ]; then
            tar -xvf toolchain.tar
            rm -f toolchain.tar
          fi
          cd ..
          
          echo "Verifying local directory structure:"
          ls -la

      # 5. Configure JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 6. Merge Samsung Toolchain seamlessly into Workspace
      - name: Merge Samsung Toolchain
        run: |
          echo "Unlocking write permissions on existing directories and toolchain..."
          # Note: temp_toolchain requires +w permissions here to prevent "Permission denied" errors during the final rm -rf cleanup phase.
          chmod -R +w kernel/ kernel-6.6/ vendor/ temp_toolchain/ || true
          
          echo "Merging toolchain components into the kernel tree..."
          mkdir -p kernel/build kernel/external kernel/prebuilts
          
          # Sync directories while suppressing all output (> /dev/null 2>&1) to keep logs clean. Fails gracefully if empty.
          rsync -a temp_toolchain/build/ kernel/build/ > /dev/null 2>&1 || true
          rsync -a temp_toolchain/external/ kernel/external/ > /dev/null 2>&1 || true
          rsync -a temp_toolchain/prebuilts/ kernel/prebuilts/ > /dev/null 2>&1 || true
          
          if [ -d "temp_toolchain/kernel" ]; then
            rsync -a temp_toolchain/kernel/ kernel/ > /dev/null 2>&1 || true
          fi
          
          echo "Cleaning up temporary files..."
          # Silently remove the staging folder to prevent log spam
          rm -rf temp_toolchain > /dev/null 2>&1
          
      # 7. Automatically patch the kernel tree for KernelSU
      - name: Inject KernelSU
        run: |
          echo "Entering the kernel source directory..."
          cd kernel-6.6
          
          echo "Fetching the LATEST STABLE KernelSU release..."
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          
          echo "Calculating fully dynamic KSU_VERSION..."
          cd KernelSU
          
          # Safety net: Ensure we have the full git history so the commit count isn't "1"
          git fetch --unshallow > /dev/null 2>&1 || true
          
          # Count the commits and do the math
          KSU_TAG=$(git describe --abbrev=0 --tags)
          echo "KSU_TAG=$KSU_TAG" >> $GITHUB_ENV
          KSU_MAJOR=$(echo "$KSU_TAG" | sed -E 's/^v([0-9]+).*/\1/')
          KSU_GIT_COUNT=$(git rev-list --count HEAD)
          
          # Exact match of the Makefile math: (Major * 10000) + Commit Count
          KSU_DYNAMIC_VERSION=$(( (KSU_MAJOR * 10000) + KSU_GIT_COUNT ))
          echo "Calculated Version Code: $KSU_DYNAMIC_VERSION"
          cd ..
          
          echo "Bypassing sandbox bug by patching dynamic version..."
          sed -i "s/ccflags-y += -DKSU_VERSION=16/ccflags-y += -DKSU_VERSION=$KSU_DYNAMIC_VERSION/g" KernelSU/kernel/Kbuild
          
      # 8. Fire off the original wrapper script provided by Samsung
      - name: Execute Samsung Kernel Build
        run: |
          chmod +x build_kernel.sh
          ./build_kernel.sh

      # 9. Gather the final kernel binary and .ko modules files
      - name: Prepare Artifacts for Release
        run: |
          echo "Creating output directory..."
          mkdir -p output_release/modules
          
          echo "Copying the exact Image.gz file..."
          cp out/target/product/a06/obj/KLEAF_OBJ/dist/kernel_device_modules-6.6/mgk_64_k66_kernel_aarch64.user/Image.gz output_release/ || echo "Image.gz not found!"

          echo "Recursively gathering all compiled kernel modules (.ko files)..."
          find out/target/product/a06/obj/KLEAF_OBJ/dist/ -name "*.ko" -exec cp {} output_release/modules/ \;

          MODULE_COUNT=$(ls -1q output_release/modules/ | wc -l)
          
          if [ "$MODULE_COUNT" -eq 0 ]; then
            echo "There are no .ko files found! Skipping tar creation."
          else
            echo "Creating the Debug archive with symbols..."
            # Move into the folder, get flat filenames, and pipe them directly into tar
            (cd output_release/modules && find . -name "*.ko" -printf "%P\n" | tar -czvf ../modules-debug-symbols.tar.gz -T -)
              
            echo "Stripping debug symbols for the optimized archive..."
            find output_release/modules/ -name "*.ko" -exec aarch64-linux-gnu-strip --strip-debug {} \;
              
            echo "Creating the tiny, optimized archive for normal users..."
            (cd output_release/modules && find . -name "*.ko" -printf "%P\n" | tar -czvf ../modules-optimized.tar.gz -T -)
          fi
          
          echo "Image.gz and *.ko files are ready for upload!"

      # 10. Upload directly to GitHub Releases
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          # Using a static tag name (Update this manually when you want a new version)
          tag_name: "KernelSU-${{ env.KSU_TAG }}"
          name: "Samsung A06 (SM-A065F) KernelSU"
          body: |
            Automated KernelSU build for the Samsung A06 (SM-A065F).            
            **Included Files:**
            * `Image.gz`: Image file to be packed with boot.img by using magiskboot
            * `modules-with-symbols.tar.gz`: Compiled debugging modules with symbols
            * `modules-without-symbols.tar.gz`: Compiled debugging modules without symbols
          draft: false
          prerelease: false
          files: |
            output_release/Image.gz
            output_release/modules-with-symbols.tar.gz
            output_release/modules-without-symbols.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
