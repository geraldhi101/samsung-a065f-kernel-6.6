name: Build Samsung A06 Kernel with Kernel SU (Google Drive Fetch + Samsung Open Source Toolchain)

on:
  workflow_dispatch: 

jobs:
  build:
    name: Purge, Fetch from Drive, Patch, and Build
    runs-on: ubuntu-22.04
    permissions: 
      contents: write

    steps:
      # 1. Clean up the runner to maximize free space quietly (~35GB+ reclaimed)
      - name: Free Disk Space Manually
        run: |
          echo "=== Disk Space BEFORE Cleanup ==="
          df -h
          
          echo "Purging core heavy package engines quietly (Silencing all warnings)..."
          sudo DEBIAN_FRONTEND=noninteractive apt-get purge -y -qq azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql mysql-server > /dev/null 2>&1
          sudo DEBIAN_FRONTEND=noninteractive apt-get autoremove -y -qq > /dev/null 2>&1
          sudo apt-get clean -qq > /dev/null 2>&1
          
          echo "Deleting massive pre-installed software directories (Silent & Fast)..."
          sudo rm -rf /usr/local/lib/android     # Android SDK (~12GB)
          sudo rm -rf /usr/share/dotnet          # .NET Core SDK (~4-5GB)
          sudo rm -rf /opt/ghc                   # Haskell compiler (~2GB)
          sudo rm -rf /usr/share/swift           # Swift runtime (~1GB)
          sudo rm -rf /usr/local/share/boost     # Boost C++ Libraries (~4GB)
          sudo rm -rf /opt/hostedtoolcache/CodeQL # CodeQL analysis tools (~5GB)
          sudo rm -rf /opt/hostedtoolcache/Java   # Extraneous Java versions
          sudo rm -rf /usr/local/share/powershell # PowerShell modules
          
          echo "Cleaning up residual configuration directories..."
          sudo rm -rf /etc/mysql /opt/az /etc/apt/sources.list.d/* > /dev/null 2>&1
          
          echo "Purging background docker cache layers..."
          docker image prune --all --force > /dev/null 2>&1
          
          echo "=== Disk Space AFTER Cleanup ==="
          df -h

      # 2. Install Build Dependencies and Python PIP fo Gdown
      - name: Install Build Dependencies & Repo Tool
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libc6-dev-i386 libncurses5 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 python3-pip python-is-python3
          
          # Install gdown to pull files securely from Google Drive
          pip3 install gdown
        
      # 3. Securely pull Kernel.tar.gz from Google Drive
      - name: Fetch Kernel and Toolchain from Google Drive
        run: |
          echo "Downloading Kernel.tar.gz from Google Drive..."
          gdown "https://drive.google.com/file/d/1mYxE44LH-xz8fg0GuEYxcJ-f7OS6mGke/view?usp=sharing" -O Kernel.tar.gz

          echo "Downloading Toolchain.tar.gz from Google Drive..."
          gdown "https://drive.google.com/file/d/1OxwZZNzDaY-VoSqJSFjPuKfKKQuzNcUP/view?usp=sharing" -O Toolchain.tar.gz

      # 4. Handle double extraction & drop intermediate archives instantly
      - name: Extract Samsung Kernel Archive
        run: |
          echo "Extracting Kernel.tar.gz directly to working directories..."
          tar -xzvf Kernel.tar.gz
          rm Kernel.tar.gz
          
          # Safety net for nested Kernel.tar
          if [ -f Kernel.tar ]; then
            echo "Unpacking nested Kernel.tar..."
            tar -xvf Kernel.tar
            rm Kernel.tar
          fi

          echo "Extracting Toolchain.tar.gz..."
          mkdir temp_toolchain
          tar -xzvf Toolchain.tar.gz -C temp_toolchain
          
          echo "Handling nested toolchain.tar..."
          cd temp_toolchain
          if [ -f toolchain.tar ]; then
            tar -xvf toolchain.tar
            rm toolchain.tar
          fi
          cd ..
          
          echo "Verifying local directory structure:"
          ls -la

      # 5. Configure JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 6. Merge Samsung Toolchain seamlessly into Workspace
      - name: Merge Samsung Toolchain
        run: |
          echo "Unlocking write permissions on existing directories and toolchain..."
          # TWEAK 1: Added temp_toolchain/ to unlock it so Linux doesn't complain when deleting
          chmod -R +w kernel/ kernel-6.6/ vendor/ temp_toolchain/ || true
          
          echo "Merging toolchain components into the kernel tree..."
          mkdir -p kernel/build kernel/external kernel/prebuilts
          
          # TWEAK 2: Upgraded the silencer to block ALL output and errors
          rsync -a temp_toolchain/build/ kernel/build/ > /dev/null 2>&1 || true
          rsync -a temp_toolchain/external/ kernel/external/ > /dev/null 2>&1 || true
          rsync -a temp_toolchain/prebuilts/ kernel/prebuilts/ > /dev/null 2>&1 || true
          
          if [ -d "temp_toolchain/kernel" ]; then
            rsync -a temp_toolchain/kernel/ kernel/ > /dev/null 2>&1 || true
          fi
          
          echo "Cleaning up temporary files..."
          # TWEAK 3: Total silencer on the removal command
          rm -rf temp_toolchain Toolchain.tar.gz > /dev/null 2>&1
          
      # 7. Automatically patch the kernel tree for KernelSU
      - name: Inject KernelSU
        run: |
          cd kernel-6.6
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

      # 8. Fire off the original wrapper script provided by Samsung
      - name: Execute Samsung Kernel Build
        run: |
          chmod +x build_kernel.sh
          ./build_kernel.sh

      # 9. Gather outputs for both Release (Stripped) and Debug (Unstripped)
      - name: Prepare Dual Artifacts
        run: |
          echo "Creating directories for Release and Debug..."
          mkdir -p output_release/modules
          mkdir -p output_debug/modules
          
          echo "Copying Image.gz to both..."
          cp out/target/product/a06/obj/KLEAF_OBJ/dist/kernel_device_modules-6.6/mgk_64_k66_kernel_aarch64.user/Image.gz output_release/
          cp out/target/product/a06/obj/KLEAF_OBJ/dist/kernel_device_modules-6.6/mgk_64_k66_kernel_aarch64.user/Image.gz output_debug/
          
          echo "Copying .ko modules to both..."
          cp out/target/product/a06/obj/KLEAF_OBJ/dist/*/*.ko output_release/modules/ || true
          cp out/target/product/a06/obj/KLEAF_OBJ/dist/*/*.ko output_debug/modules/ || true
          
          echo "Stripping debug symbols from the Release version ONLY..."
          aarch64-linux-gnu-strip --strip-unneeded output_release/modules/*.ko || true
          
          echo "Zipping the Production Release (Stripped)..."
          cd output_release
          zip -r9 ../Samsung-A06-KernelSU-Release.zip *
          cd ..
          
          echo "Zipping the Developer Debug (Unstripped)..."
          cd output_debug
          zip -r9 ../Samsung-A06-KernelSU-Debug.zip *
          cd ..

      # 10. Upload BOTH directly to GitHub Releases
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0-${{ github.run_number }}"
          name: "Samsung A06 KernelSU Build #${{ github.run_number }}"
          body: |
            Automated KernelSU build for the Samsung A06.
            
            **Included Files:**
            * 📦 `...-Release.zip`: Stripped and lightweight. **(Flash this one!)**
            * 🛠️ `...-Debug.zip`: Unstripped with debug symbols. (For developers/crash tracing only).
          # You can list multiple files here by using the pipe (|) and putting them on new lines
          files: |
            Samsung-A06-KernelSU-Release.zip
            Samsung-A06-KernelSU-Debug.zip
