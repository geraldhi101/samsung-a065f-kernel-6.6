name: 'Preparing files for the release'
description: 'Finds, renames, and prepares the compiled kernel image for release.'

inputs:
  device-codename:
    description: 'The device codename'
    required: true
  kernel-version:
    description: 'The firmware string'
    required: true
  root-method:
    description: 'The root method used'
    required: true

runs:
  using: "composite"
  steps:
    - name: Prepare Files for Release
      shell: bash
      run: |
        echo "=== Setting up Release Variables ==="
        DEVICE="${{ inputs.device-codename }}"
        ROOT_METHOD="${{ inputs.root-method }}"
        KERNEL_VER="${{ inputs.kernel-version }}"
        
        ROOT_VERSION="${ROOT_TAG:-unknown}"
        
        if [ "$ROOT_METHOD" == "none" ]; then
          FINAL_FILENAME="Kernel-${KERNEL_VER}.gz"
          RELEASE_TITLE="${DEVICE^^} Kernel - ${KERNEL_VER}"
          RELEASE_TAG="${KERNEL_VER}-Stock"
        else
          if [ "$ROOT_METHOD" == "kernelsu" ]; then
            DISPLAY_ROOT="KernelSU"
          elif [ "$ROOT_METHOD" == "kernelsu-next" ]; then
            DISPLAY_ROOT="KernelSU-Next"
          fi
          
          FINAL_FILENAME="${DISPLAY_ROOT}-${ROOT_VERSION}-${KERNEL_VER}.gz"
          RELEASE_TITLE="${DISPLAY_ROOT} ${ROOT_VERSION} for ${DEVICE^^} - ${KERNEL_VER}"
          RELEASE_TAG="${KERNEL_VER}-${DISPLAY_ROOT}-${ROOT_VERSION}"
        fi
        
        echo "Target filename: $FINAL_FILENAME"
        
        echo "=== Preparing Output Directory ==="
        mkdir -p output_release
        
        echo "=== Locating and Renaming Image.gz ==="
        SEARCH_PATH="out/target/product/$DEVICE/obj/KLEAF_OBJ/dist/"
        
        IMAGE_FILE=$(find "$SEARCH_PATH" -name "Image.gz" | head -n 1)
        
        if [ -z "$IMAGE_FILE" ]; then
          echo "FATAL: Image.gz not found in $SEARCH_PATH!"
          exit 1
        fi
        
        echo "Found Image.gz at: $IMAGE_FILE"
        
        cp "$IMAGE_FILE" "output_release/$FINAL_FILENAME"
        echo "Successfully copied and renamed to: output_release/$FINAL_FILENAME"
        
        echo "RELEASE_TITLE=$RELEASE_TITLE" >> $GITHUB_ENV
        echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
