name: 'Preparing Kernel and Toolchain sources'
description: 'Conditionally extracts sources only if they were downloaded as archives.'

runs:
  using: "composite"
  steps:
    - name: Preparing Kernel source and toolchain archives
      shell: bash
      run: |
        echo "=== Checking for Kernel Archives ==="
        
        if [ -f "Kernel.tar.gz" ]; then
          echo "Kernel.tar.gz found. Extracting..."
          tar -xzvf Kernel.tar.gz
          rm -f Kernel.tar.gz
        fi
        
        if [ -f "Kernel.tar" ]; then
          echo "Kernel.tar found. Unpacking..."
          tar -xvf Kernel.tar
          rm -f Kernel.tar
        fi

        if [ ! -f "Kernel.tar.gz" ] && [ ! -f "Kernel.tar" ]; then
          echo "No Kernel archives found. Assuming source is already uncompressed (e.g., from git clone)."
        fi

        echo "=== Checking for Toolchain Archives ==="
        
        if [ -f "toolchain.tar.gz" ]; then
          echo "toolchain.tar.gz found. Extracting..."
          mkdir -p temp_toolchain
          tar -xzvf toolchain.tar.gz -C temp_toolchain
          rm -f toolchain.tar.gz
        fi
        
        if [ -f "temp_toolchain/toolchain.tar" ]; then
          echo "Nested toolchain.tar found. Unpacking..."
          tar -xvf temp_toolchain/toolchain.tar -C temp_toolchain
          rm -f temp_toolchain/toolchain.tar
        fi

        if [ ! -f "toolchain.tar.gz" ] && [ ! -d "temp_toolchain" ]; then
          echo "No toolchain archives found. Assuming toolchain is already uncompressed."
        fi
        
        echo "=== Verifying Working Directory ==="
        ls -la
