name: 'Fetch Samsung A06 (SM-A065F) Sources'
description: 'Fetch kernel/toolchain sources using a single selected method.'

inputs:
  method:
    description: 'Download method passed from main workflow'
    required: true
    default: 'gdown'

runs:
  using: "composite"
  steps:
    - name: Run Fetch Logic
      shell: bash
      run: |
        METHOD="${{ inputs.method }}"
        echo "Selected fetch method: $METHOD"
        
        GDOWN_KERNEL="https://drive.google.com/file/d/1mYxE44LH-xz8fg0GuEYxcJ-f7OS6mGke/view?usp=sharing"
        GDOWN_TOOLCHAIN="https://drive.google.com/file/d/1OxwZZNzDaY-VoSqJSFjPuKfKKQuzNcUP/view?usp=sharing"
        
        WGET_KERNEL=""
        WGET_TOOLCHAIN=""
        
        GIT_KERNEL=""
        GIT_TOOLCHAIN=""

        if [ "$METHOD" == "gdown" ]; then
          echo "==> Attempting gdown..."
          if ! command -v gdown &> /dev/null; then
            pip3 install --break-system-packages gdown || pip3 install gdown
          fi
          gdown "$GDOWN_KERNEL" -O Kernel.tar.gz || exit 1
          gdown "$GDOWN_TOOLCHAIN" -O toolchain.tar.gz || exit 1

        elif [ "$METHOD" == "wget" ]; then
          echo "==> Attempting wget..."
          wget -O Kernel.tar.gz "$WGET_KERNEL" || exit 1
          wget -O toolchain.tar.gz "$WGET_TOOLCHAIN" || exit 1

        elif [ "$METHOD" == "git" ]; then
          echo "==> Attempting git clone..."
          git clone --depth=1 "$GIT_KERNEL" kernel_src || exit 1
          git clone --depth=1 "$GIT_TOOLCHAIN" temp_toolchain || exit 1
          
        else
          echo "FATAL: Unknown fetch method: $METHOD"
          exit 1
        fi
        
        echo "SUCCESS: Sources fetched successfully!"
